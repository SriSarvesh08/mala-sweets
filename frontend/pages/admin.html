<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Mala Sweets and Ghee</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <script src="/js/utils.js"></script>
  <script src="/js/navbar.js"></script>

  <div class="admin-login">
    <div class="login-card">
      <div style="text-align:center;margin-bottom:28px;">
        <div style="font-size:2.5rem;margin-bottom:10px;">🧈</div>
        <h2>Admin Panel</h2>
        <p>Mala Sweets and Ghee — Secure Login</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="admin@ssdairy.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <div id="loginError" style="color:var(--error);font-size:.88rem;margin-bottom:14px;display:none;"></div>

      <button class="btn btn-brown btn-full" id="loginBtn" onclick="doLogin()">
        Login to Dashboard
      </button>

    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('adminToken')) window.location.href = 'admin-dashboard.html';

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      errEl.style.display = 'none';
      if (!email || !password) { errEl.textContent = 'Please enter email and password.'; errEl.style.display = 'block'; return; }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        localStorage.setItem('adminToken', data.token);
        window.location.href = 'admin-dashboard.html';
      } catch (e) {
        errEl.textContent = e.message || 'Invalid credentials';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login to Dashboard';
      }
    }
  </script>
</body>
</html>
